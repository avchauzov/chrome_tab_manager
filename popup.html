<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    button {
      width: 100%;
      padding: 7px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .toggle-row label {
      flex: 1;
      margin-right: 8px;
      color: #333;
    }
    #status {
      margin: 10px 0;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 12px;
      color: #555;
      min-height: 1.2em;
    }
    .footer {
      margin-top: 8px;
      text-align: center;
    }
    .footer button {
      width: auto;
      padding: 4px 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <button id="sortDedupe">Sort &amp; Deduplicate</button>
  <button id="groupDomain">Group Tabs by Domain</button>
  <button id="checkStale">Check Stale Tabs</button>

  <div class="toggle-row">
    <label for="autoGroup">Auto group by domain</label>
    <input type="checkbox" id="autoGroup">
  </div>
  <div class="toggle-row">
    <label for="realTimeDedup">Real-time deduplication</label>
    <input type="checkbox" id="realTimeDedup">
  </div>

  <div id="status">Ready</div>

  <div class="footer">
    <button id="settings">Settings</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
